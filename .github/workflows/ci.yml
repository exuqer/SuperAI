name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install locked backend dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.lock
      - name: Compile backend
        run: python -m compileall -q server
      - name: Lint backend
        run: ruff check server tests
      - name: Run backend tests
        run: python -m pytest
      - name: Verify application readiness
        run: |
          python - <<'PY'
          from fastapi.testclient import TestClient
          from server.server import app
          with TestClient(app) as client:
              response = client.get('/api/readiness')
              response.raise_for_status()
              payload = response.json()
              assert payload['status'] == 'ready', payload
          PY

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Run frontend unit tests
        run: npm test
      - name: Type-check and build frontend
        run: npm run build
